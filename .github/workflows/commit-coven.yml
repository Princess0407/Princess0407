name: "✧ The Commit Coven ✧"

on:
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - '.github/workflows/commit-coven.yml'
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  conjure:
    name: Conjure the Coven SVG
    runs-on: ubuntu-latest

    steps:
      - name: 🕯️ Checkout Repository
        uses: actions/checkout@v4

      - name: 🔮 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 📜 Generate Commit Coven SVG
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: ${{ github.repository_owner }}
        run: node scripts/generate-coven.js

      - name: 🕸️ Commit & Push
        run: |
          git config user.name "commit-coven[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/commit-coven.svg
          git diff --staged --quiet || git commit -m "✧ Update Commit Coven visualization"
          git push
